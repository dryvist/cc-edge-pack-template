name: Cribl Pack Release (reusable)

# Reusable workflow consumed by every dryvist Cribl pack via:
#
#   uses: dryvist/cc-edge-pack-template/.github/workflows/cribl-pack-release.yml@main
#
# Builds the .crbl tarball and uploads to GitHub Releases. Triggered by tag
# push in the calling workflow.

on:
  workflow_call:
    inputs:
      additional_files:
        description: 'Extra files to include in the .crbl tarball, space-separated. LICENSE included automatically if present.'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build .crbl and publish GitHub release
    runs-on: ubuntu-latest
    env:
      ADDITIONAL_FILES: ${{ inputs.additional_files }}
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get GitHub slug info
        uses: rlespinasse/github-slug-action@v5

      - name: Build .crbl tarball
        run: |
          set -euo pipefail
          TAG_SLUG="${GITHUB_REF_SLUG}"
          OUT_VERSIONED="/tmp/${REPO_NAME}-${TAG_SLUG}.crbl"
          OUT_LATEST="/tmp/${REPO_NAME}.crbl"

          INCLUDE=(data default package.json README.md)
          [[ -f LICENSE ]] && INCLUDE+=(LICENSE)
          for extra in $ADDITIONAL_FILES; do
            [[ -e "$extra" ]] && INCLUDE+=("$extra")
          done

          tar -czf "$OUT_VERSIONED" "${INCLUDE[@]}"
          cp "$OUT_VERSIONED" "$OUT_LATEST"
          ls -lh "$OUT_VERSIONED" "$OUT_LATEST"
          echo "OUT_VERSIONED=$OUT_VERSIONED" >> "$GITHUB_ENV"
          echo "OUT_LATEST=$OUT_LATEST" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, 'RC') || contains(github.ref, 'TC') }}
          generate_release_notes: true
          files: |
            ${{ env.OUT_VERSIONED }}
            ${{ env.OUT_LATEST }}

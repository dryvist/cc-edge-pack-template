name: Cribl Pack Test (reusable)

# Reusable workflow consumed by every dryvist Cribl pack via:
#
#   uses: dryvist/cc-edge-pack-template/.github/workflows/cribl-pack-test.yml@main
#
# Inputs are typed reusable-workflow inputs only (no untrusted github.event.*
# strings); safe per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  workflow_call:
    inputs:
      pack_type:
        description: "Pack type — 'edge' or 'stream'."
        type: string
        required: true
      cribl_versions:
        description: >-
          JSON array of {version, required} objects — one parallel test leg
          per entry. `required: true` blocks merges on failure; `required:
          false` is best-effort. Default: `latest` (N) plus the last patches
          of N-1 and N-2 minors. Bump all three when `latest` rolls over to
          a new minor.
        type: string
        default: '[{"version":"latest","required":true},{"version":"4.17.1","required":false},{"version":"4.16.1","required":false}]'
      node_version:
        description: 'Node.js version for the test runner.'
        type: string
        default: 'lts/*'
      yq_version:
        description: 'Pinned mikefarah/yq version (without leading v).'
        type: string
        default: '4.44.5'

permissions:
  contents: read

jobs:
  validate:
    name: Validate pack structure
    runs-on: ubuntu-latest
    env:
      PACK_TYPE: ${{ inputs.pack_type }}
    steps:
      - name: Checkout pack
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install yq (pinned)
        uses: dcarbone/install-yq-action@4075b4dca348d74bd83f2bf82d30f25d7c54539b # v1.3.1
        with:
          version: v${{ inputs.yq_version }}

      - name: Lint YAML
        uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47 # v1.5.0
        with:
          path: default/
          config_file: .yamllint.yml

      - name: Validate pack structure
        run: ./scripts/validate-pack-structure.sh

  test:
    # One leg per entry in `cribl_versions`. Required legs block PR merges;
    # optional legs run best-effort. `fail-fast: false` so every leg's result
    # is visible regardless of sibling outcomes.
    name: Test pack pipelines (Cribl ${{ matrix.cribl.version }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        cribl: ${{ fromJSON(inputs.cribl_versions) }}
    continue-on-error: ${{ !matrix.cribl.required }}
    env:
      PACK_TYPE: ${{ inputs.pack_type }}
    services:
      cribl:
        image: cribl/cribl:${{ matrix.cribl.version }}
        ports:
          - 9000:9000
          - 10080:10080
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/api/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - name: Checkout pack
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.11.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests
        run: pnpm install --frozen-lockfile

      - name: Lint + format check (Biome)
        working-directory: tests
        run: pnpm run lint

      - name: Type check
        working-directory: tests
        run: pnpm run typecheck

      - name: Wait for Cribl health endpoint
        uses: iFaxity/wait-on-action@a7d13170ec542bdca4ef8ac4b15e9c6aa00a6866 # v1.2.1
        with:
          resource: http://localhost:9000/api/v1/health
          timeout: 120000
          interval: 2000

      - name: Run Vitest suite
        working-directory: tests
        env:
          CRIBL_HOST: localhost
          CRIBL_PORT: '9000'
          CRIBL_USER: admin
          CRIBL_PASS: admin
        run: pnpm run test

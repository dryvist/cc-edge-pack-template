name: Cribl Pack Test (reusable)

# Reusable workflow consumed by every dryvist Cribl pack via:
#
#   uses: dryvist/cc-edge-pack-template/.github/workflows/cribl-pack-test.yml@main
#
# Inputs are typed reusable-workflow inputs only (no untrusted github.event.*
# strings); safe per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  workflow_call:
    inputs:
      pack_type:
        description: "Pack type — 'edge' or 'stream'."
        type: string
        required: true
      cribl_versions:
        description: >-
          JSON array of {version, required} objects. Each entry spawns one
          parallel test leg against `cribl/cribl:<version>`. Legs with
          `required: true` block PR merges on failure; `required: false` legs
          run best-effort (failures visible but non-blocking). Default covers
          `latest` plus the last patch of the previous minor (4.17.1 as of
          2026-05). Bump the second entry when a new minor lands and the old
          previous-minor stops being a meaningful compatibility signal.
        type: string
        default: '[{"version":"latest","required":true},{"version":"4.17.1","required":false}]'
      node_version:
        description: 'Node.js version for the test runner.'
        type: string
        default: 'lts/*'
      yq_version:
        description: 'Pinned mikefarah/yq version (without leading v).'
        type: string
        default: '4.44.5'

permissions:
  contents: read

jobs:
  validate:
    name: Validate pack structure
    runs-on: ubuntu-latest
    env:
      PACK_TYPE: ${{ inputs.pack_type }}
    steps:
      - name: Checkout pack
        uses: actions/checkout@v4

      - name: Install yq (pinned)
        uses: dcarbone/install-yq-action@v1.3.1
        with:
          version: v${{ inputs.yq_version }}

      - name: Lint YAML
        uses: frenck/action-yamllint@v1.5.0
        with:
          path: default/
          config_file: .yamllint.yml

      - name: Validate pack structure
        run: ./scripts/validate-pack-structure.sh

  test:
    # One leg per entry in `cribl_versions`. Required legs block PR merges;
    # optional legs run best-effort. `fail-fast: false` so every leg's result
    # is visible regardless of sibling outcomes.
    name: Test pack pipelines (Cribl ${{ matrix.cribl.version }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        cribl: ${{ fromJSON(inputs.cribl_versions) }}
    continue-on-error: ${{ !matrix.cribl.required }}
    env:
      PACK_TYPE: ${{ inputs.pack_type }}
    services:
      cribl:
        image: cribl/cribl:${{ matrix.cribl.version }}
        ports:
          - 9000:9000
          - 10080:10080
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/api/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - name: Checkout pack
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests
        run: pnpm install --frozen-lockfile

      - name: Lint + format check (Biome)
        working-directory: tests
        run: pnpm run lint

      - name: Type check
        working-directory: tests
        run: pnpm run typecheck

      - name: Wait for Cribl health endpoint
        uses: iFaxity/wait-on-action@v1.2.1
        with:
          resource: http://localhost:9000/api/v1/health
          timeout: 120000
          interval: 2000

      - name: Run Vitest suite
        working-directory: tests
        env:
          CRIBL_HOST: localhost
          CRIBL_PORT: '9000'
          CRIBL_USER: admin
          CRIBL_PASS: admin
        run: pnpm run test

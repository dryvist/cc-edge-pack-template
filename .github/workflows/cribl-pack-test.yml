name: Cribl Pack Test (reusable)

# Reusable workflow consumed by every dryvist Cribl pack via:
#
#   uses: dryvist/cc-edge-pack-template/.github/workflows/cribl-pack-test.yml@main
#
# Inputs are typed reusable-workflow inputs only (no untrusted github.event.*
# strings); safe per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  workflow_call:
    inputs:
      pack_type:
        description: "Pack type — 'edge' or 'stream'."
        type: string
        required: true
      cribl_version:
        description: "cribl/cribl Docker image tag. Defaults to 'latest'."
        type: string
        default: 'latest'
      node_version:
        description: 'Node.js version for the test runner.'
        type: string
        default: 'lts/*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate pack structure
    runs-on: ubuntu-latest
    env:
      PACK_TYPE: ${{ inputs.pack_type }}
    steps:
      - name: Checkout pack
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install yamllint
        run: pipx install yamllint

      - name: Verify pack_type input
        run: |
          if [[ "$PACK_TYPE" != "edge" && "$PACK_TYPE" != "stream" ]]; then
            echo "::error::pack_type must be 'edge' or 'stream', got '$PACK_TYPE'"
            exit 1
          fi

      - name: Verify required pack files exist
        run: |
          set -euo pipefail
          required=(package.json default/pack.yml default/pipelines/route.yml README.md)
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::Required pack file missing"
              missing=$((missing+1))
            fi
          done
          if [[ $missing -gt 0 ]]; then
            exit 1
          fi
          echo "All required pack files present."

      - name: Verify package.json shape
        run: |
          set -euo pipefail
          name=$(jq -r .name package.json)
          version=$(jq -r .version package.json)
          minLogStreamVersion=$(jq -r .minLogStreamVersion package.json)
          for v in "$name" "$version" "$minLogStreamVersion"; do
            if [[ -z "$v" || "$v" == "null" ]]; then
              echo "::error::package.json missing required field"
              exit 1
            fi
          done
          if [[ "$PACK_TYPE" == "edge" ]]; then
            if [[ ! "$name" =~ ^cc-edge-.*-io$ ]]; then
              echo "::warning::Pack name '$name' does not follow 'cc-edge-<source>-io' convention"
            fi
          else
            if [[ ! "$name" =~ ^cc-stream-.*-io$ ]]; then
              echo "::warning::Pack name '$name' does not follow 'cc-stream-<source>-io' convention"
            fi
          fi
          echo "package.json: name=$name version=$version minLogStreamVersion=$minLogStreamVersion"

      - name: Verify routes reference defined pipelines
        run: |
          set -euo pipefail
          mapfile -t pipelines_in_routes < <(yq -r '.routes[].pipeline' default/pipelines/route.yml | sort -u)
          missing=0
          for pipeline in "${pipelines_in_routes[@]}"; do
            if [[ -z "$pipeline" || "$pipeline" == "null" ]]; then continue; fi
            conf="default/pipelines/$pipeline/conf.yml"
            if [[ ! -f "$conf" ]]; then
              echo "::error::Route references pipeline '$pipeline' but $conf does not exist"
              missing=$((missing+1))
            fi
          done
          if [[ $missing -gt 0 ]]; then exit 1; fi
          echo "All route -> pipeline references valid."

      - name: Verify routes use __group output
        run: |
          set -euo pipefail
          bad=$(yq -r '.routes[] | select(.output != "__group") | .id' default/pipelines/route.yml)
          if [[ -n "$bad" ]]; then
            echo "::warning::These routes do not use 'output: __group' (validator rule): $bad"
          fi

      - name: Verify samples directory non-empty
        run: |
          if [[ -d data/samples ]]; then
            count=$(find data/samples -maxdepth 1 -name '*.json' -type f | wc -l | tr -d ' ')
            if [[ $count -eq 0 ]]; then
              echo "::warning::data/samples/ exists but contains no JSON sample events"
            else
              echo "Found $count sample event file(s) in data/samples/"
            fi
          else
            echo "::warning::data/samples/ does not exist — pack lacks sample events"
          fi

      - name: Lint YAML
        run: |
          cat > /tmp/yamllint.yml <<'EOF'
          extends: default
          rules:
            line-length: disable
            comments-indentation: disable
            comments: disable
            truthy:
              level: warning
            indentation:
              level: warning
            document-start: disable
          EOF
          yamllint -c /tmp/yamllint.yml default/

  test:
    name: Test pack pipelines (Vitest)
    runs-on: ubuntu-latest
    needs: validate
    env:
      PACK_TYPE: ${{ inputs.pack_type }}
    services:
      cribl:
        image: cribl/cribl:${{ inputs.cribl_version }}
        ports:
          - 9000:9000
          - 10080:10080
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/api/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - name: Checkout pack
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm
          cache-dependency-path: tests/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tests
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: tests
        run: pnpm run typecheck

      - name: Wait for Cribl to be ready
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/api/v1/health >/dev/null 2>&1; then
              echo "Cribl is ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Cribl did not become ready in 120s"
          docker ps -a
          exit 1

      - name: Run Vitest suite
        working-directory: tests
        env:
          CRIBL_HOST: localhost
          CRIBL_PORT: '9000'
          CRIBL_USER: admin
          CRIBL_PASS: admin
        run: pnpm run test
